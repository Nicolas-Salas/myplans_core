server:
  port: 0
spring:
  datasource:
    url: jdbc:h2:mem:coretest;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
storage:
  base-dir: /tmp/myplans-core-uploads